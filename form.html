<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description"
        content="WDD 131 – Dynamic Web Fundamentals- Douglas Caceres-This website is designed to test my new skills">
    <meta name="author" content="Douglas Caceres">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    
</head>
<body>
<main>
    <form id="reviewForm" action="review.html" method="get">
        <h1>Product Review</h1>

        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <fieldset>
            <legend>Overall Rating</legend>
            <div class="stars">
                <input type="radio" id="star5" name="rating" value="5" required><label for="star5">☆</label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4">☆</label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3">☆</label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2">☆</label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1">☆</label>
            </div>
        </fieldset>

        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>

        <fieldset>
            <legend>Which features did you find useful? (Check all that apply)</legend>
            <label><input type="checkbox" name="features" value="durability"> Durability</label>
            <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
            <label><input type="checkbox" name="features" value="performance"> Performance</label>
            <label><input type="checkbox" name="features" value="design"> Design</label>
        </fieldset>

        <label for="writtenReview">Written Review (Optional)</label>
        <textarea id="writtenReview" name="writtenReview" rows="4"></textarea>

        <label for="userName">Your Name (Optional)</label>
        <input type="text" id="userName" name="userName">

        <input type="submit" value="Post Review">
    </form>
</main>
<footer class="last-modified">
    <p>&copy; <span id="currentyear"></span> Douglas Caceres. Guatemala. </p>
    <p>Last Modified: <span id="lastModified"></span></p>
</footer>
</body>
</html>
