<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source media="(min-width: 1000px)" srcset="images/">
                <source media="(min-width: 500px)" srcset="images/hero-medium.jpg">
                <img src="images/hero-small.jpg" alt="Bountiful Temple" width="500" height="300">
            </picture>
        </div>
    </main>
</body>
</html>
